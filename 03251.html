<<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            padding: 30px; 
        }

        .box {
            font-family: "Times New Roman", Times, serif;
            font-size: 32px;
            font-weight: bold;
            padding: 10px 15px;
            margin-bottom: 15px;
            width: 400px;
        }

        .box1 {
            background-color: lightblue;
            border: 6px double #e74c3c; 
        }

        .box2 {
            background-color: yellow;
            border: 2px solid #3498db;
            border-radius: 15px;
        }

        .box3 {
            background-color: #4caf50;
            border: 10px dotted gray;
        }
    </style>
</head>
<body>

    <div class="box box1">Hello World</div>
    <div class="box box2">Hello World</div>
    <div class="box box3">Hello World</div>

</body>
</html>
